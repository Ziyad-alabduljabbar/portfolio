<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziad | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f17;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --primary:#00ffd5;
  --accent:#ff3d6e;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 20%, #00ffd5 0%, transparent 30%),
    radial-gradient(circle at 80% 70%, #ff3d6e 0%, transparent 30%);
  filter:blur(120px);
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:clamp(3rem,8vw,6rem);
  font-weight:700;
}

.hero p{
  opacity:.7;
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:12px 28px;
  border:1px solid var(--primary);
  background:transparent;
  color:var(--primary);
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  background:var(--primary);
  color:#000;
}

/* SECTIONS */
section{
  padding:80px 20px;
}

.title{
  text-align:center;
  font-size:2rem;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:var(--primary);
}

footer{
  text-align:center;
  padding:30px;
  opacity:.5;
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <h1>ZIAD</h1>
    <p>Data Scientist | AI Enthusiast</p>
    <button class="btn" onclick="document.getElementById('projects').scrollIntoView({behavior:'smooth'})">
      استكشف المشاريع
    </button>
  </div>
</section>

<section>
  <h2 class="title">المهارات</h2>
  <div class="grid">
    <div class="card">Python</div>
    <div class="card">Machine Learning</div>
    <div class="card">Data Analysis</div>
    <div class="card">Deep Learning</div>
  </div>
</section>

<section id="projects">
  <h2 class="title">المشاريع</h2>
  <div class="grid" id="projects-container"></div>
</section>

<footer>
  © Ziad Portfolio
</footer>

<script>
const username="Ziyad-alabduljabbar";

fetch(`https://api.github.com/users/${username}/repos`)
.then(r=>r.json())
.then(data=>{
  const container=document.getElementById("projects-container");

  data.slice(0,6).forEach(repo=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${repo.name}</h3>
      <p>${repo.description||"Project"}</p>
      <a href="${repo.html_url}" target="_blank" style="color:#00ffd5;">GitHub</a>
    `;
    container.appendChild(div);
  });
});
</script>

</body>
</html>
