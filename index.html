<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziyad | Data Scientist</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#060a12;
--surface:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);
--primary:#00e5c0;
--text:#e8eaf0;
--muted:rgba(232,234,240,0.5);
}

.light{
--bg:#f7f9fc;
--surface:#ffffff;
--text:#0b0f19;
--muted:#555;
--border:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text)}

nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:18px 40px;
background:rgba(6,10,18,0.9);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
z-index:100;
}

.nav-links{display:flex;gap:20px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none}
.nav-links a:hover{color:var(--primary)}

.lang-toggle{display:flex;gap:10px}
.lang-btn{
padding:5px 12px;
border-radius:99px;
border:1px solid var(--border);
background:transparent;
color:var(--muted);
cursor:pointer;
}
.lang-btn.active{background:var(--primary);color:#000}

.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:100px 40px;
max-width:1100px;
margin:auto;
}

.hero h1{
font-size:clamp(3rem,6vw,5rem);
}
.hero span{color:var(--primary)}

.hero-sub{color:var(--muted);margin:20px 0;max-width:500px}

.hero-stats{display:flex;gap:40px;margin-top:40px}
.stat-num{color:var(--primary);font-size:2rem;font-weight:700}
.stat-label{font-size:13px;color:var(--muted)}

section{padding:100px 40px;max-width:1100px;margin:auto}

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.project-card{
background:var(--surface);
border:1px solid var(--border);
padding:20px;
border-radius:16px;
transition:.3s;
}

.project-card:hover{
transform:translateY(-6px);
border-color:var(--primary);
}

.project-link{color:var(--primary);text-decoration:none;font-size:13px}

</style>
</head>

<body>

<nav>
<ul class="nav-links">
<li><a href="#">Home</a></li>
</ul>

<div class="lang-toggle">
<button class="lang-btn active" onclick="setLang('ar')">AR</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="toggleMode()">🌓</button>
</div>
</nav>

<main>

<div class="hero">
<div>
<h1>Ziyad <span>Al-Abduljabbar</span></h1>

<p class="hero-sub t"
data-ar="طالب علوم حاسب متخصص في علم البيانات — أحول البيانات إلى قرارات باستخدام ML و NLP."
data-en="Data Science student — turning data into decisions using ML & NLP.">
طالب علوم حاسب متخصص في علم البيانات — أحول البيانات إلى قرارات باستخدام ML و NLP.
</p>

<div class="hero-stats">
<div>
<div class="stat-num">800K+</div>
<div class="stat-label t" data-ar="سجل بيانات" data-en="Records">سجل بيانات</div>
</div>

<div>
<div class="stat-num">3+</div>
<div class="stat-label t" data-ar="مشاريع" data-en="Projects">مشاريع</div>
</div>

<div>
<div class="stat-num">ML</div>
<div class="stat-label t" data-ar="التخصص" data-en="Focus">التخصص</div>
</div>
</div>

</div>
</div>

<section>
<h2 class="t" data-ar="المشاريع" data-en="Projects">المشاريع</h2>
<div class="projects-grid" id="projects-container"></div>
</section>

</main>

<script>
let lang="ar";

/* 🌍 LANGUAGE */
function setLang(l){
lang=l;
document.documentElement.lang=l;
document.documentElement.dir=l==="ar"?"rtl":"ltr";

document.querySelectorAll('.t').forEach(el=>{
if(el.dataset[l]) el.textContent=el.dataset[l];
});

document.querySelectorAll('.lang-btn').forEach(b=>{
b.classList.toggle('active', b.textContent===l.toUpperCase());
});

renderProjects(lang);
}

/* 🌗 DARK MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* 🚀 PROJECTS */
async function renderProjects(l){
const c=document.getElementById("projects-container");
c.innerHTML="Loading...";

try{
const res=await fetch("https://api.github.com/users/ziyad-alabduljabbar/repos?sort=updated");
const data=await res.json();

c.innerHTML="";

data
.filter(r=>!r.fork)
.slice(0,6)
.forEach(repo=>{
const d=document.createElement("div");
d.className="project-card";

d.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description || (l==="ar"?"لا يوجد وصف":"No description")}</p>
<a href="${repo.html_url}" target="_blank" class="project-link">
${l==="ar"?"عرض المشروع →":"View Project →"}
</a>
`;

c.appendChild(d);
});

}catch{
c.innerHTML="<p>فشل تحميل المشاريع</p>";
}
}

/* INIT */
renderProjects(lang);
</script>

</body>
</html>
