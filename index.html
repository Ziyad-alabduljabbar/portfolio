<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziad | Elite Data Scientist</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#00ffc6;
    --accent:#ff2e63;
    --bg:#050505;
    --glass:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'IBM Plex Sans Arabic',sans-serif;
    background:var(--bg);
    color:#fff;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 20% 30%, #00ffc6 0%, transparent 25%),
        radial-gradient(circle at 80% 70%, #ff2e63 0%, transparent 25%);
    filter:blur(120px);
    z-index:-2;
}

/* CURSOR */
.cursor{
    width:20px;height:20px;
    border:2px solid var(--primary);
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1{
    font-family:'Orbitron';
    font-size:clamp(3rem,10vw,7rem);
    text-shadow:0 0 20px #fff,0 0 40px var(--accent),0 0 80px var(--accent);
}

.hero h2{
    margin-top:1rem;
    font-weight:300;
}

.hero p{
    margin-top:1rem;
    opacity:0.8;
}

/* BUTTON */
.btn{
    margin-top:2rem;
    padding:1rem 2.5rem;
    border:1px solid var(--primary);
    background:transparent;
    color:var(--primary);
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:var(--primary);
    color:#000;
    box-shadow:0 0 20px var(--primary);
}

/* SECTION */
section{
    padding:4rem 2rem;
}

/* TITLE */
.title{
    text-align:center;
    font-size:2.5rem;
    margin-bottom:3rem;
    font-family:'Orbitron';
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:2rem;
}

/* CARD */
.card{
    backdrop-filter:blur(15px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:2rem;
    border-radius:15px;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 0 25px var(--primary);
}

/* FOOTER */
footer{
    text-align:center;
    padding:2rem;
    opacity:.6;
}
</style>
</head>

<body>

<div class="cursor"></div>

<section class="hero">
    <div>
        <h1>ZIAD</h1>
        <h2 id="typewriter"></h2>
        <p>ذكاء اصطناعي • علم بيانات • حلول غير تقليدية</p>
        <button class="btn" onclick="scrollToProjects()">استكشف</button>
    </div>
</section>

<section>
    <h2 class="title">المهارات</h2>
    <div class="grid">
        <div class="card">Python / AI</div>
        <div class="card">Machine Learning</div>
        <div class="card">Data Analysis</div>
        <div class="card">Deep Learning</div>
    </div>
</section>

<section id="projects">
    <h2 class="title">المشاريع</h2>
    <div class="grid" id="projects-container"></div>
</section>

<footer>
    <p>© Ziad | Elite Portfolio</p>
</footer>

<script>
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
    cursor.style.top=e.clientY+'px';
    cursor.style.left=e.clientX+'px';
});

const text="Data Scientist 🚀";
let i=0;
function typing(){
    if(i<text.length){
        document.getElementById("typewriter").innerHTML+=text[i];
        i++;
        setTimeout(typing,60);
    }
}
typing();

window.addEventListener('scroll',()=>{
    document.querySelector('.hero').style.transform=
    `translateY(${window.scrollY*0.3}px)`;
});

function scrollToProjects(){
    document.getElementById('projects').scrollIntoView({behavior:'smooth'});
}

const username="yourusername";

fetch(`https://api.github.com/users/${username}/repos`)
.then(res=>res.json())
.then(data=>{
    const container=document.getElementById("projects-container");

    data
    .filter(repo=>!repo.fork)
    .sort((a,b)=>b.stargazers_count-a.stargazers_count)
    .slice(0,6)
    .forEach(repo=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <h3>${repo.name}</h3>
            <p>${repo.description||"مشروع احترافي على GitHub"}</p>
            <a href="${repo.html_url}" target="_blank">عرض المشروع</a>
        `;
        container.appendChild(div);
    });
});
</script>

</body>
</html>
