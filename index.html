<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ziyad | Data Scientist</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0f19;
--card:rgba(255,255,255,0.05);
--text:#e6e9f2;
--muted:#9aa3b2;
--primary:#00e5c0;
--border:rgba(255,255,255,0.08);
}

.light{
--bg:#f7f9fc;
--card:#ffffff;
--text:#0b0f19;
--muted:#555;
--border:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.2);
z-index:100;
}

.logo{
font-weight:700;
color:var(--primary);
}

.toggle{
cursor:pointer;
padding:8px 14px;
border-radius:8px;
background:var(--card);
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
padding:20px;
}

.hero h1{
font-size:clamp(2.5rem,6vw,5rem);
font-weight:700;
}

.hero span{color:var(--primary)}

.hero p{
color:var(--muted);
margin-top:20px;
max-width:600px;
}

/* STATS */
.stats{
display:flex;
gap:40px;
margin-top:40px;
}

.stat{
text-align:center;
}

.stat-num{
font-size:2rem;
color:var(--primary);
font-weight:700;
}

.stat-label{
font-size:13px;
color:var(--muted);
}

/* PROJECTS */
section{
padding:100px 40px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:20px;
border-radius:16px;
transition:.3s;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
border-color:var(--primary);
}

.card h3{margin-bottom:10px}
.card p{color:var(--muted);font-size:14px}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(40px);
transition:.7s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>
<div class="logo">ZA</div>
<div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<div class="hero">
<h1>Ziyad <span>Al-Abduljabbar</span></h1>

<p>
Data Science student — building ML & NLP systems that turn raw data into impact.
</p>

<div class="stats">
<div class="stat">
<div class="stat-num">800K+</div>
<div class="stat-label">Records</div>
</div>

<div class="stat">
<div class="stat-num">3+</div>
<div class="stat-label">Projects</div>
</div>

<div class="stat">
<div class="stat-num">ML</div>
<div class="stat-label">Focus</div>
</div>
</div>
</div>

<section>
<h2>Projects</h2>
<div class="grid" id="projects"></div>
</section>

<script>

/* 🌗 DARK MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* 🚀 GITHUB API */
const USERNAME = "ziyad-alabduljabbar";

fetch(`https://api.github.com/users/${USERNAME}/repos`)
.then(res=>res.json())
.then(data=>{
const container = document.getElementById("projects");

data.slice(0,6).forEach(repo=>{
const div = document.createElement("div");
div.className = "card fade";

div.innerHTML = `
<h3>${repo.name}</h3>
<p>${repo.description || "No description"}</p>
<a href="${repo.html_url}" target="_blank">View →</a>
`;

container.appendChild(div);
});
});

/* ✨ SCROLL ANIMATION */
const observer = new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
});

setTimeout(()=>{
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));
},500);

</script>

</body>
</html>
